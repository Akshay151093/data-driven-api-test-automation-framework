name: API Automation Tests

workflow_dispatch:
  inputs:
    suiteXmlFile:
      description: 'TestNG suite XML file to execute'
      required: true
      default: 'testng.xml'
      type: choice
      options:
        - testng.xml
        - testng-smoke.xml
        - testng-regression.xml
        - testng-user.xml
        - testng-negative.xml

schedule:
 - corn: '30 18 * * 1'

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run API tests
        run: mvn clean test -DsuiteXmlFile=${{ github.event.inputs.suiteXmlFile || 'testng.xml' }}

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      - name: Upload execution logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-logs
          path: logs