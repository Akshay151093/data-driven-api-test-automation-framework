name: API Automation Tests

on:
  workflow_dispatch:
    inputs:
      suiteXmlFile:
        description: 'TestNG suite XML file to execute'
        required: true
        default: 'testng.xml'
        type: choice
        options:
          - testng.xml
          - testng-smoke.xml
          - testng-regression.xml
          - testng-user.xml
          - testng-negative.xml

  schedule:
    - cron: '30 18 * * 1'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  api-tests:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run API tests
        run: mvn clean test -DsuiteXmlFile=${{ github.event.inputs.suiteXmlFile || 'testng.xml' }}

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: warn

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          if-no-files-found: warn

      - name: Upload execution logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-logs
          path: logs
          if-no-files-found: warn

      - name: Install Allure CLI
        if: always()
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -zxvf allure-2.29.0.tgz
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Generate Allure HTML report
        if: always()
        run: allure generate target/allure-results --clean -o target/allure-report

      - name: Upload Allure report to GitHub Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/allure-report

      - name: Deploy Allure report to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4